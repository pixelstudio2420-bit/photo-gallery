# ────────────────────────────────────────────────────────────────────────
# Photo Gallery — log rotation
# ────────────────────────────────────────────────────────────────────────
# Install:  sudo cp logrotate.conf /etc/logrotate.d/photo-gallery
# Test:     sudo logrotate -d /etc/logrotate.d/photo-gallery
# Force:    sudo logrotate -f /etc/logrotate.d/photo-gallery
# ────────────────────────────────────────────────────────────────────────

# Laravel application log (set LOG_CHANNEL=daily in .env for daily split;
# if you stay on `single`, this config still works — it'll just rotate
# the one big file).
/var/www/photo-gallery/storage/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su www-data www-data
    create 0644 www-data www-data
}

# Supervisor-captured worker output
/var/log/photo-gallery-worker.log /var/log/photo-gallery-downloads.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su root root
    create 0644 root root
    postrotate
        # Nudge supervisor to reopen file handles after rotation.
        /usr/bin/supervisorctl signal USR2 photo-gallery:* >/dev/null 2>&1 || true
    endscript
}
