# ────────────────────────────────────────────────────────────────────────
# Photo Gallery — Nginx server block
# ────────────────────────────────────────────────────────────────────────
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/photo-gallery
#   sudo ln -s /etc/nginx/sites-available/photo-gallery /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision SSL with certbot:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS (certbot adds this block automatically, but
# keeping it explicit makes the config survive a re-provisioning).
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    root /var/www/photo-gallery/public;
    index index.php;
    charset utf-8;

    # Large photo uploads — tune to your max upload size + some headroom.
    # Must also match `post_max_size` and `upload_max_filesize` in php.ini.
    client_max_body_size 50M;
    client_body_timeout 120s;

    # SSL is managed by certbot — it writes the cert paths + ssl_protocols.
    # See /etc/letsencrypt/options-ssl-nginx.conf.

    # ── Laravel rewrite rule ────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Static asset caching ────────────────────────────────────────
    location ~* \.(ico|css|js|gif|jpe?g|png|webp|avif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vite build output — aggressive caching since files are hash-named.
    location /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── PHP-FPM ─────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Longer timeout — BuildOrderZipJob can take minutes, and the
        # slip-upload flow talks to SlipOK externally.
        fastcgi_read_timeout 300;
    }

    # ── Deny hidden files (except .well-known for certbot) ──────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny direct access to sensitive paths ───────────────────────
    location ~ ^/(\.env|\.git|composer\.(json|lock)|package-lock\.json|artisan) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Compression (on top of gzip_static if you pre-compress) ─────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Security headers at the edge (redundant with the Laravel
    # middleware — belt-and-braces so even static asset responses are
    # covered). Remove if you use Cloudflare — CF already adds these.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logs ────────────────────────────────────────────────────────
    access_log /var/log/nginx/photo-gallery-access.log;
    error_log  /var/log/nginx/photo-gallery-error.log warn;
}
