# ─────────────────────────────────────────────────────────────────────
#  Local Postgres + Redis stack for the pgsql fork
# ─────────────────────────────────────────────────────────────────────
#  Usage:
#    docker compose up -d            # start in background
#    docker compose ps               # check health
#    docker compose logs -f postgres # tail logs
#    docker compose down             # stop (keeps data)
#    docker compose down -v          # stop + delete volumes (full reset)
#
#  Connect from Laravel (in .env):
#    DB_HOST=127.0.0.1
#    DB_PORT=5432
#    DB_DATABASE=jabphap
#    DB_USERNAME=postgres
#    DB_PASSWORD=secret
#
#  Connect via psql CLI from inside container:
#    docker compose exec postgres psql -U postgres -d jabphap
#
#  pgAdmin web UI: http://localhost:5050  (login: admin@local / admin)
# ─────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: jabphap-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: jabphap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: Asia/Bangkok
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-runs *.sql / *.sh files in this folder on first init.
      # Drop seed dumps here to bootstrap a fresh DB.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jabphap"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - jabphap

  redis:
    image: redis:7-alpine
    container_name: jabphap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jabphap

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jabphap-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jabphap

volumes:
  pgdata:
  redisdata:
  pgadmindata:

networks:
  jabphap:
    driver: bridge
